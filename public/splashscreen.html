<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading…</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #e5e7eb;
      }
      .card {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        border-radius: 16px;
        background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        -webkit-user-select: none;
        user-select: none;
      }
      .logo {
        width: 72px;
        height: 72px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .subtitle {
        font-size: 12px;
        opacity: 0.7;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      body {
        opacity: 0;
        animation: fadeIn 0.25s ease-out forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/tauri-boilerplate.png" alt="logo" />
      <div class="title">Tauri Boilerplate</div>
      <div class="spinner"></div>
      <div class="subtitle">Loading…</div>
    </div>
  </body>
</html>
